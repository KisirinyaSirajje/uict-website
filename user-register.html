<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student / Staff Registration - UICT e-Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .error {
            color: #ef4444;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
        
        .success {
            color: #10b981;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--primary);
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Create Account</h1>
        <div id="error-message" class="error"></div>
        <div id="success-message" class="success"></div>
        <form id="register-form">
            <div class="form-group">
                <label>Choose Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Choose Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Register</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
            Already have an account? <a href="user-login.html" style="color: var(--primary); text-decoration: none;">Login here</a>
        </div>
        <a href="index.html" class="back-link">Return to Home</a>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const btn = document.querySelector('.btn');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            btn.disabled = true;
            btn.innerText = 'Registering...';
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: 'user' }) // Explicitly setting role to 'user'
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successMsg.innerText = 'Account created successfully! You can now log in.';
                    successMsg.style.display = 'block';
                    document.getElementById('register-form').reset();
                    
                    // Optional: redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'user-login.html';
                    }, 2000);
                } else {
                    errorMsg.innerText = data.error || 'Registration failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Server error. Please try again later.';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Register';
            }
        });
    </script>
</body>
</html>
